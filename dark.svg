<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-label="Premium dark GitHub profile banner">
  <defs>
    <clipPath id="r"><rect x="0" y="0" width="1180" height="610" rx="28"/></clipPath>

    <!-- Theme -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <radialGradient id="g1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
      <animate attributeName="cx" values="20%;25%;20%" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="20%;16%;20%" dur="12s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="g2" cx="82%" cy="25%" r="58%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
      <animate attributeName="cx" values="82%;78%;82%" dur="11s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="g3" cx="75%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
      <animate attributeName="cy" values="85%;78%;85%" dur="13s" repeatCount="indefinite"/>
    </radialGradient>

    <linearGradient id="borderShimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,.06)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,.22)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <filter id="blur20"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".45"/>
    </filter>
    <filter id="asciiGlow" x="-40%" y="-40%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="asciiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animate attributeName="x1" values="0;1;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="0;0.2;0" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="1;0.8;1" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <pattern id="noise" width="140" height="140" patternUnits="userSpaceOnUse">
      <circle cx="8" cy="10" r="1" fill="#fff" fill-opacity=".03"/>
      <circle cx="64" cy="44" r="1" fill="#fff" fill-opacity=".025"/>
      <circle cx="102" cy="88" r="1" fill="#fff" fill-opacity=".03"/>
      <circle cx="36" cy="126" r="1" fill="#fff" fill-opacity=".02"/>
    </pattern>

    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="7s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#r)">
    <rect width="1180" height="610" fill="url(#bgGrad)"/>
    <rect width="1180" height="610" fill="url(#g1)"/>
    <rect width="1180" height="610" fill="url(#g2)"/>
    <rect width="1180" height="610" fill="url(#g3)"/>
    <rect width="1180" height="610" fill="url(#noise)" opacity=".8"/>

    <!-- particles -->
    <g opacity=".35">
      <circle cx="140" cy="120" r="1.5" fill="#22D3EE"><animate attributeName="cy" values="120;95;120" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="1020" cy="170" r="1.3" fill="#7C3AED"><animate attributeName="cy" values="170;145;170" dur="5s" repeatCount="indefinite"/></circle>
      <circle cx="910" cy="490" r="1.6" fill="#10B981"><animate attributeName="cy" values="490;460;490" dur="6s" repeatCount="indefinite"/></circle>
      <circle cx="260" cy="520" r="1.2" fill="#22D3EE"><animate attributeName="cy" values="520;500;520" dur="4.5s" repeatCount="indefinite"/></circle>
    </g>

    <!-- split panels -->
    <rect x="26" y="24" width="430" height="562" rx="24" fill="#0F172A" fill-opacity=".62" stroke="rgba(255,255,255,.08)" filter="url(#shadow)"/>
    <rect x="476" y="24" width="678" height="562" rx="24" fill="#0F172A" fill-opacity=".62" stroke="rgba(255,255,255,.08)" filter="url(#shadow)"/>

    <!-- glass reflections -->
    <path d="M36 40 H440 V78 C365 92 260 76 36 120 Z" fill="#fff" opacity=".05"/>
    <path d="M486 40 H1144 V72 C1040 86 860 70 486 110 Z" fill="#fff" opacity=".05"/>

    <!-- LEFT: ASCII terminal -->
    <g transform="translate(56 72)">
      <rect x="0" y="0" width="370" height="466" rx="16" fill="#020617" fill-opacity=".55" stroke="rgba(255,255,255,.06)"/>
      <text x="24" y="34" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">$ ./render-identity</text>

      <g filter="url(#asciiGlow)">
        <g transform="translate(20 70)">
          <animateTransform attributeName="transform" type="translate" values="20 70;20 64;20 70" dur="5s" repeatCount="indefinite"/>

          <text fill="url(#asciiGrad)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing=".6">
            <tspan x="0" y="0" opacity="0">      .-''''-.      <animate attributeName="opacity" begin="0s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="22" opacity="0">    .'  _  _  '.    <animate attributeName="opacity" begin=".2s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="44" opacity="0">   /   (o)(o)   \   <animate attributeName="opacity" begin=".4s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="66" opacity="0">  |  .-.___.-.  |   <animate attributeName="opacity" begin=".6s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="88" opacity="0">  | /  \_/  \ | |   <animate attributeName="opacity" begin=".8s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="110" opacity="0">  | |  ___  | | |   <animate attributeName="opacity" begin="1s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="132" opacity="0">  | \ '---' / | |   <animate attributeName="opacity" begin="1.2s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="154" opacity="0">   \ '.___.' / /    <animate attributeName="opacity" begin="1.4s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="176" opacity="0">    '._   _.' /     <animate attributeName="opacity" begin="1.6s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
            <tspan x="0" y="198" opacity="0">       '''''         <animate attributeName="opacity" begin="1.8s" dur=".25s" from="0" to="1" fill="freeze"/></tspan>
          </text>

          <rect x="0" y="214" width="240" height="18" fill="none"/>
          <text x="0" y="228" fill="#22D3EE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
            identity: online_
            <tspan>█<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan>
          </text>
        </g>
      </g>

      <!-- scanline -->
      <rect x="14" y="58" width="342" height="24" fill="url(#scanline)" opacity=".8">
        <animate attributeName="y" values="58;420;58" dur="3.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- RIGHT terminal -->
    <g transform="translate(506 64)">
      <rect x="0" y="0" width="618" height="478" rx="18" fill="#020617" fill-opacity=".48" stroke="rgba(255,255,255,.07)"/>
      <circle cx="22" cy="20" r="5" fill="#ef4444"/><circle cx="40" cy="20" r="5" fill="#f59e0b"/><circle cx="58" cy="20" r="5" fill="#10b981"/>

      <text x="24" y="60" fill="#F8FAFC" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Hi 👋 I'm {NAME}</text>

      <!-- typing roles -->
      <g transform="translate(24 94)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#22D3EE">
        <text x="0" y="0" opacity="1">Frontend Engineer<tspan>█<animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/></tspan>
          <animate attributeName="opacity" values="1;1;0;0;0" keyTimes="0;0.22;0.25;0.99;1" dur="15s" repeatCount="indefinite"/>
        </text>
        <text x="0" y="0" opacity="0">Full Stack Developer<tspan>█<animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/></tspan>
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.28;0.48;0.51;1" dur="15s" repeatCount="indefinite"/>
        </text>
        <text x="0" y="0" opacity="0">Open Source Contributor<tspan>█<animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/></tspan>
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.51;0.54;0.72;0.75;1" dur="15s" repeatCount="indefinite"/>
        </text>
        <text x="0" y="0" opacity="0">UI Engineer · AI Enthusiast<tspan>█<animate attributeName="opacity" values="1;0;1" dur=".9s" repeatCount="indefinite"/></tspan>
          <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.75;0.78;1" dur="15s" repeatCount="indefinite"/>
        </text>
      </g>

      <!-- sequential info -->
      <g transform="translate(24 148)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">
        <text x="0" y="34" fill="#94A3B8" opacity="0">📍 Location: San Francisco, CA<animate attributeName="opacity" begin="0.8s" dur=".4s" from="0" to="1" fill="freeze"/></text>
        <text x="0" y="64" fill="#94A3B8" opacity="0">🎓 Education: Computer Science<animate attributeName="opacity" begin="1.2s" dur=".4s" from="0" to="1" fill="freeze"/></text>
        <text x="0" y="94" fill="#94A3B8" opacity="0">🚀 Current Focus: AI + DX + Product UI<animate attributeName="opacity" begin="1.6s" dur=".4s" from="0" to="1" fill="freeze"/></text>
        <text x="0" y="124" fill="#94A3B8" opacity="0">🌐 Portfolio: yourdomain.dev<animate attributeName="opacity" begin="2.0s" dur=".4s" from="0" to="1" fill="freeze"/></text>
        <text x="0" y="154" fill="#94A3B8" opacity="0">✉️ Email: hello@yourdomain.dev<animate attributeName="opacity" begin="2.4s" dur=".4s" from="0" to="1" fill="freeze"/></text>
      </g>

      <!-- skills pills -->
      <g transform="translate(24 322)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#F8FAFC">
        <g>
          <rect x="0" y="0" width="70" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="18" y="19">React</text>
          <rect x="78" y="0" width="78" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="95" y="19">Next.js</text>
          <rect x="164" y="0" width="76" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="181" y="19">Node.js</text>
          <rect x="248" y="0" width="98" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="264" y="19">TypeScript</text>
          <rect x="354" y="0" width="86" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="370" y="19">Tailwind</text>
          <rect x="448" y="0" width="70" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="467" y="19">Python</text>

          <rect x="0" y="38" width="70" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="18" y="57">Docker</text>
          <rect x="78" y="38" width="84" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="94" y="57">Postgres</text>
          <rect x="170" y="38" width="56" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="188" y="57">AWS</text>
          <rect x="234" y="38" width="46" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="250" y="57">Git</text>
          <rect x="288" y="38" width="62" height="28" rx="14" fill="#0f172a" stroke="url(#pillGrad)"/><text x="307" y="57">Figma</text>
        </g>
      </g>

      <!-- social -->
      <g transform="translate(24 434)" fill="none" stroke="#22D3EE" stroke-width="1.6">
        <circle cx="16" cy="16" r="14"/><text x="10" y="21" fill="#F8FAFC" font-size="11">GH</text>
        <circle cx="62" cy="16" r="14"/><text x="56" y="21" fill="#F8FAFC" font-size="11">in</text>
        <circle cx="108" cy="16" r="14"/><text x="102" y="21" fill="#F8FAFC" font-size="11">X</text>
        <circle cx="154" cy="16" r="14"/><text x="148" y="21" fill="#F8FAFC" font-size="11">◦</text>
      </g>
    </g>

    <!-- outer border shimmer -->
    <rect x="1" y="1" width="1178" height="608" rx="28" fill="none" stroke="url(#borderShimmer)" stroke-width="2"/>
  </g>
</svg>
