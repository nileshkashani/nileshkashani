



<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-label="Premium light GitHub profile banner">
  <defs>
    <clipPath id="r"><rect x="0" y="0" width="1180" height="610" rx="28"/></clipPath>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <radialGradient id="g1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
      <animate attributeName="cx" values="20%;25%;20%" dur="10s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="g2" cx="82%" cy="25%" r="58%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity=".10"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
      <animate attributeName="cx" values="82%;78%;82%" dur="11s" repeatCount="indefinite"/>
    </radialGradient>
    <radialGradient id="g3" cx="75%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#10B981" stop-opacity=".09"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
      <animate attributeName="cy" values="85%;78%;85%" dur="13s" repeatCount="indefinite"/>
    </radialGradient>

    <linearGradient id="asciiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="55%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#10B981"/>
      <animate attributeName="x1" values="0;1;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;0;1" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#r)">
    <rect width="1180" height="610" fill="url(#bgGrad)"/>
    <rect width="1180" height="610" fill="url(#g1)"/>
    <rect width="1180" height="610" fill="url(#g2)"/>
    <rect width="1180" height="610" fill="url(#g3)"/>

    <rect x="26" y="24" width="430" height="562" rx="24" fill="#F8FAFC" stroke="rgba(15,23,42,.08)"/>
    <rect x="476" y="24" width="678" height="562" rx="24" fill="#F8FAFC" stroke="rgba(15,23,42,.08)"/>

    <g transform="translate(56 72)">
      <rect x="0" y="0" width="370" height="466" rx="16" fill="#ffffff" stroke="rgba(15,23,42,.08)"/>
      <text x="24" y="34" fill="#475569" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">$ ./render-identity</text>
      <g transform="translate(20 70)">
        <animateTransform attributeName="transform" type="translate" values="20 70;20 64;20 70" dur="5s" repeatCount="indefinite"/>
        <text fill="url(#asciiGrad)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
          <tspan x="0" y="0">      .-''''-.      </tspan>
          <tspan x="0" y="22">    .'  _  _  '.    </tspan>
          <tspan x="0" y="44">   /   (o)(o)   \   </tspan>
          <tspan x="0" y="66">  |  .-.___.-.  |   </tspan>
          <tspan x="0" y="88">  | /  \_/  \ | |   </tspan>
          <tspan x="0" y="110">  | |  ___  | | |   </tspan>
          <tspan x="0" y="132">  | \ '---' / | |   </tspan>
          <tspan x="0" y="154">   \ '.___.' / /    </tspan>
          <tspan x="0" y="176">    '._   _.' /     </tspan>
          <tspan x="0" y="198">       '''''         </tspan>
        </text>
      </g>
    </g>

    <g transform="translate(506 64)">
      <rect x="0" y="0" width="618" height="478" rx="18" fill="#ffffff" stroke="rgba(15,23,42,.08)"/>
      <text x="24" y="60" fill="#0F172A" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Hi 👋 I'm {NAME}</text>
      <text x="24" y="98" fill="#06B6D4" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">Frontend Engineer <tspan>█<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/></tspan></text>
      <text x="24" y="146" fill="#475569" font-size="16">📍 Location: San Francisco, CA</text>
      <text x="24" y="176" fill="#475569" font-size="16">🎓 Education: Computer Science</text>
      <text x="24" y="206" fill="#475569" font-size="16">🚀 Current Focus: AI + DX + Product UI</text>
      <text x="24" y="236" fill="#475569" font-size="16">🌐 Portfolio: yourdomain.dev</text>
      <text x="24" y="266" fill="#475569" font-size="16">✉️ Email: hello@yourdomain.dev</text>
    </g>
  </g>
</svg>
